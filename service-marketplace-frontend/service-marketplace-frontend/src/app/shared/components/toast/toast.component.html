<div class="toast-stack">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast" [class]="'toast-' + toast.type">
      <span class="toast-icon">
        @if (toast.type === 'success') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M8 12l3 3 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        } @else if (toast.type === 'error') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 16v-5M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        }
      </span>
      <span class="toast-msg">{{ toast.message }}</span>
      <button class="toast-close" (click)="toastService.dismiss(toast.id)">&times;</button>
    </div>
  }
</div>
