<section class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <span class="auth-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M3 11l9-8 9 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <h1>Welcome back</h1>
      <p class="text-muted">Log in to book services or manage your listings.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email Address</label>
        <input id="email" class="input" type="email" formControlName="email" placeholder="you&#64;example.com"
          [class.invalid]="email.invalid && email.touched" autocomplete="email">
        @if (email.invalid && email.touched) {
          <div class="error-text">Enter a valid email address.</div>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-group">
          <input id="password" class="input" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
            placeholder="Enter your password" [class.invalid]="password.invalid && password.touched" autocomplete="current-password" style="padding-left:14px;padding-right:40px">
          <button type="button" class="toggle-pass" (click)="showPassword.set(!showPassword())">
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3l18 18M10.6 10.6a2 2 0 002.8 2.8M9.5 5.1A10.5 10.5 0 0121 12a13 13 0 01-3 3.7M6.1 6.5A13 13 0 003 12a10.5 10.5 0 007.9 6.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
            }
          </button>
        </div>
        @if (password.invalid && password.touched) {
          <div class="error-text">Password is required.</div>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> } @else { Log In }
      </button>
    </form>

    <p class="auth-footer text-center text-muted mt-24">
      Don't have an account? <a routerLink="/auth/register">Create one</a>
    </p>
  </div>
</section>
